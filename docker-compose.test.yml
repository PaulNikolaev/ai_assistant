services:

  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_assistant_test
      POSTGRES_USER: ai_assistant
      POSTGRES_PASSWORD: test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_assistant"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: "no"

  redis-test:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: "no"

  qdrant-test:
    image: qdrant/qdrant:latest
    ports:
      - "6334:6333"
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':>/dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: "no"

  minio-test:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9002:9000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: "no"

volumes:
  postgres_test_data:
  qdrant_test_data:
  minio_test_data:
