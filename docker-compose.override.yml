# Dev overrides: port exposure, hot-reload, debug mode.
# Applied automatically by docker compose alongside docker-compose.yml.

services:

  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  qdrant:
    ports:
      - "6333:6333"

  minio:
    ports:
      - "9000:9000"
      - "9001:9001"

  mailhog:
    ports:
      - "1025:1025"
      - "8025:8025"

  grafana:
    ports:
      - "3000:3000"

  backend:
    ports:
      - "8000:8000"
    environment:
      DEBUG: "true"
    volumes:
      - ./backend/app:/app/app
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000

  messengers:
    ports:
      - "8001:8000"

  worker:
    volumes:
      - ./backend/app:/app/app
